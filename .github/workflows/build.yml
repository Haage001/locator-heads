# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build all versions (Stonecutter)
        run: |
          # Read comma-separated versions from gradle.properties and convert to space-separated array
          RAW_VERSIONS=$(grep "^stonecutter_versions=" gradle.properties | cut -d'=' -f2)
          IFS=',' read -ra VERSIONS_ARRAY <<< "$RAW_VERSIONS"
          
          for v_raw in "${VERSIONS_ARRAY[@]}"; do
            v=$(echo "$v_raw" | xargs) # trim whitespace
            echo "Building $v natively..."
            export STONECUTTER_ACTIVE=$v
            ./gradlew stonecutterSwitchTo$v
            ./gradlew clean chiseled:build
            mkdir -p versions/$v/build/libs/
            cp chiseled/build/libs/*.jar versions/$v/build/libs/
          done
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: versions/*/build/libs/*.jar